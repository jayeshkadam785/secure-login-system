{% extends "base.html" %}
{% block title %}Verify 2FA - SecureLogin{% endblock %}
{% block content %}
<div class="card">
  <h1>Two-Factor Verification</h1>
  <p class="muted">Enter the 6-digit code from your authenticator app.</p>
  <form method="POST" action="{{ url_for('verify_2fa') }}" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <label for="otp_code">Authentication Code</label>
    <input type="text" id="otp_code" name="otp_code" maxlength="6" pattern="[0-9]{6}" placeholder="000000" required autofocus>
    <button type="submit" class="btn-primary">Verify</button>
  </form>
</div>
{% endblock %}
